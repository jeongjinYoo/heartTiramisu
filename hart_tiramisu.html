let cracks=[],particles=[];
let hp=100;
let shakeMag=0,shakeX=0,shakeY=0,hitFlash=0;
let lidScale=1,lidAlpha=1,lidAnim=false;
let yummyAlpha=0,yummyScale=0,yummyAnim=false;

const HCX=W/2,HCY=H/2+10,HS=118;

function inHeart(x,y){
  const dx=(x-HCX)/HS,dy=(y-HCY)/HS;
  const v=dx*dx+dy*dy-1;
  return v*v*v-dx*dx*dy*dy*dy<0.08;
}

function addCrack(x,y){
  const ba=Math.atan2(y-HCY,x-HCX);
  const n=5+Math.floor(Math.random()*4);
  for(let i=0;i<n;i++){
    const a=ba+(i/n)*Math.PI*2+(Math.random()-0.5)*0.6;
    const len=16+Math.random()*HS*0.65;
    const segs=[];
    let px=x-HCX,py=y-HCY;
    const steps=4+Math.floor(Math.random()*5);
    for(let s=0;s<steps;s++){
      const dl=len/steps;
      px+=Math.cos(a+(Math.random()-0.5)*0.7)*dl;
      py+=Math.sin(a+(Math.random()-0.5)*0.7)*dl;
      segs.push({x:px,y:py});
    }
    cracks.push({ox:x-HCX,oy:y-HCY,segs});
  }
}

function spawnParts(x,y,big){
  const n=big?55:22;
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2;
    const spd=big?3+Math.random()*9:1+Math.random()*5;
    const isDust=Math.random()>0.4;
    particles.push({
      x,y,
      vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-(big?2.5:1.5),
      r:isDust?2+Math.random()*5:1+Math.random()*3,
      alpha:0.95,
      life:big?0.008+Math.random()*0.015:0.014+Math.random()*0.024,
      col:isDust
        ?`hsl(${15+Math.random()*20},${50+Math.random()*20}%,${22+Math.floor(Math.random()*28)}%)`
        :`hsl(${30+Math.random()*20},${15+Math.random()*15}%,${78+Math.floor(Math.random()*18)}%)`,
      pts:null
    });
  }
}

function genChunkPts(sz){
  const n=5+Math.floor(Math.random()*4);
  const pts=[];
  for(let i=0;i<n;i++){
    const a=(i/n)*Math.PI*2;
    const r=sz/2*(0.55+Math.random()*0.5);
    pts.push({x:Math.cos(a)*r,y:Math.sin(a)*r});
  }
  return pts;
}

function spawnChunkDebris(){
  const n=28;
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2;
    const spd=3+Math.random()*8;
    const sz=6+Math.random()*22;
    particles.push({
      x:HCX+(Math.random()-0.5)*HS*0.85,
      y:HCY+(Math.random()-0.5)*HS*0.7,
      vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-3,
      r:sz,rot:Math.random()*Math.PI*2,
      rotV:(Math.random()-0.5)*0.18,
      alpha:1,life:0.006+Math.random()*0.01,
      pts:genChunkPts(sz)
    });
  }
}

function handleClick(x,y){
  if(state==='lid'){
    if(!lidAnim){lidAnim=true;status.textContent='';}
    return;
  }
  if(state==='done') return;
  if(inHeart(x,y)){
    const dmg=9+Math.random()*13;
    hp=Math.max(0,hp-dmg);
    addCrack(x,y);
    spawnParts(x,y,false);
    shakeMag=7+dmg*0.4;
    hitFlash=0.55;
    status.textContent=hp>60?'더 세게!':hp>30?'조금만 더...':hp>0?'거의 다 했다!':'';
    if(hp<=0){
      state='done';
      spawnChunkDebris();
      spawnParts(HCX,HCY,true);
      for(let i=0;i<3;i++) spawnParts(HCX+(Math.random()-0.5)*80,HCY+(Math.random()-0.5)*60,false);
      shakeMag=22;
      status.textContent='';
      setTimeout(()=>{yummyAnim=true;},600);
    }
  }
}

wrap.addEventListener('mousemove',e=>{
  const r=wrap.getBoundingClientRect();
  mx=e.clientX-r.left;my=e.clientY-r.top;
});
wrap.addEventListener('mousedown',e=>{
  pressing=true;
  const r=wrap.getBoundingClientRect();
  handleClick(e.clientX-r.left,e.clientY-r.top);
});
wrap.addEventListener('mouseup',()=>{pressing=false;});
wrap.addEventListener('mouseleave',()=>{pressing=false;});
wrap.addEventListener('touchmove',e=>{
  e.preventDefault();
  const r=wrap.getBoundingClientRect();
  const t=e.touches[0];
  mx=t.clientX-r.left;my=t.clientY-r.top;
},{passive:false});
wrap.addEventListener('touchstart',e=>{
  e.preventDefault();
  pressing=true;
  const r=wrap.getBoundingClientRect();
  const t=e.touches[0];
  mx=t.clientX-r.left;my=t.clientY-r.top;
  handleClick(mx,my);
},{passive:false});
wrap.addEventListener('touchend',()=>{pressing=false;});

// 숟가락 이미지 커서 - 하트 부분이 커서 포인트
// 이미지 크기 200x134, 하트볼은 오른쪽 상단 -> 좌우반전 후 왼쪽 상단
// 렌더 크기
const SW=90, SH=60;
// 하트볼이 좌우반전 후 왼쪽 상단에 위치 -> offset을 하트볼 중심으로
const SPOON_OX = SW*0.22; // 하트 중심 x offset from draw origin
const SPOON_OY = SH*0.25; // 하트 중심 y offset from draw origin

function drawSpoon(x,y,dn){
  if(!IMG.spoon) return;
  ctx.save();
  ctx.translate(x,y);
  // pressing: 살짝 기울어지며 눌리는 느낌
  if(dn){
    ctx.rotate(0.15);
    ctx.scale(0.92,0.92);
  }
  // 커서 포인트(하트볼 중심)가 x,y에 오도록 offset
  ctx.drawImage(IMG.spoon, -SPOON_OX, -SPOON_OY, SW, SH);
  ctx.restore();
}

function heartClip(cx,cy,s){
  ctx.beginPath();
  ctx.save();ctx.translate(cx,cy);
  ctx.moveTo(0,-s*0.25);
  ctx.bezierCurveTo(s*0.5,-s*0.9,s*1.1,-s*0.1,0,s*0.7);
  ctx.bezierCurveTo(-s*1.1,-s*0.1,-s*0.5,-s*0.9,0,-s*0.25);
  ctx.closePath();
  ctx.restore();
}

function drawYummy(){
  if(yummyAlpha<=0) return;
  ctx.save();
  ctx.translate(HCX,HCY+8);
  ctx.scale(yummyScale,yummyScale);
  ctx.globalAlpha=yummyAlpha;
  ctx.font='bold 52px Georgia, serif';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.strokeStyle='rgba(120,50,10,0.5)';
  ctx.lineWidth=5;
  ctx.strokeText('맛있다',0,0);
  ctx.fillStyle='#fff8ee';
  ctx.fillText('맛있다',0,0);
  ctx.globalAlpha=yummyAlpha*0.4;
  ctx.fillStyle='#ffe4b0';
  ctx.fillText('맛있다',0,0);
  ctx.restore();
}

function drawScene(){
  ctx.clearRect(0,0,W,H);
  ctx.save();
  ctx.translate(shakeX,shakeY);

  if(state==='lid'){
    ctx.drawImage(IMG.inner,0,0,W,H);
    ctx.save();
    ctx.globalAlpha=lidAlpha;
    ctx.translate(W/2,H/2);ctx.scale(lidScale,lidScale);ctx.translate(-W/2,-H/2);
    ctx.drawImage(IMG.lid,0,0,W,H);
    ctx.restore();
  } else {
    ctx.drawImage(IMG.inner,0,0,W,H);
    if(state==='choco'){
      ctx.drawImage(IMG.choco,0,0,W,H);
      ctx.save();ctx.translate(HCX,HCY);
      for(const cr of cracks){
        const a=Math.min(1,(1-hp/100)*2.5)*0.9;
        ctx.beginPath();ctx.moveTo(cr.ox,cr.oy);
        for(const s of cr.segs) ctx.lineTo(s.x,s.y);
        ctx.strokeStyle=`rgba(6,1,0,${a})`;
        ctx.lineWidth=0.8+(1-hp/100)*1.5;ctx.stroke();
        ctx.strokeStyle=`rgba(255,235,210,${a*0.25})`;
        ctx.lineWidth=0.4;ctx.stroke();
      }
      ctx.restore();
      if(hitFlash>0){
        heartClip(HCX,HCY,HS);
        ctx.fillStyle=`rgba(255,140,60,${hitFlash*0.22})`;ctx.fill();
      }
    } else {
      drawYummy();
    }
  }

  ctx.restore();
  drawSpoon(mx,my,pressing);
}

function drawParts(){
  pCtx.clearRect(0,0,W,H);
  for(const pt of particles){
    pCtx.save();
    pCtx.globalAlpha=Math.max(0,pt.alpha);
    if(pt.pts){
      pCtx.save();
      pCtx.translate(pt.x,pt.y);
      pCtx.rotate(pt.rot||0);
      const dg=pCtx.createLinearGradient(-pt.r/2,-pt.r/2,pt.r/2,pt.r/2);
      dg.addColorStop(0,'#3d1a0a');dg.addColorStop(1,'#5e3015');
      pCtx.fillStyle=dg;
      pCtx.strokeStyle='rgba(0,0,0,0.3)';pCtx.lineWidth=0.6;
      pCtx.beginPath();
      pt.pts.forEach((pp,i)=>i===0?pCtx.moveTo(pp.x,pp.y):pCtx.lineTo(pp.x,pp.y));
      pCtx.closePath();pCtx.fill();pCtx.stroke();
      pCtx.restore();
    } else {
      pCtx.fillStyle=pt.col;
      pCtx.beginPath();pCtx.arc(pt.x,pt.y,pt.r,0,Math.PI*2);pCtx.fill();
    }
    pCtx.restore();
  }
}

function init(){loop();}

function loop(){
  requestAnimationFrame(loop);
  if(shakeMag>0.3){shakeX=(Math.random()-0.5)*shakeMag;shakeY=(Math.random()-0.5)*shakeMag;shakeMag*=0.8;}
  else{shakeX=0;shakeY=0;}
  if(hitFlash>0) hitFlash-=0.04;

  if(lidAnim && state==='lid'){
    lidScale+=0.055;lidAlpha-=0.065;
    if(lidAlpha<=0){lidAnim=false;state='choco';status.textContent='초코를 깨보세요!';}
  }

  if(yummyAnim){
    yummyScale+=(1-yummyScale)*0.12;
    yummyAlpha+=(1-yummyAlpha)*0.09;
    if(yummyAlpha>0.97){yummyAlpha=1;yummyScale=1;yummyAnim=false;}
  }

  for(let i=particles.length-1;i>=0;i--){
    const pt=particles[i];
    pt.vy+=0.15;pt.vx*=0.96;pt.vy*=0.96;
    pt.x+=pt.vx;pt.y+=pt.vy;
    if(pt.rot!==undefined) pt.rot+=pt.rotV||0;
    pt.alpha-=pt.life;
    if(pt.alpha<=0) particles.splice(i,1);
  }

  drawScene();
  drawParts();
}
</script>
